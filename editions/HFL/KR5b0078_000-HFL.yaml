front:
  text: 上清太一金闕玉璽金眞紀
  hash: sha256:e168aec50d2e7c3f5be074d8d3bf93ed190f483450fe23340ac358527d22ba63
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0078_HFL_000-001a, image: hfl/0185/0185-066.png}
body:
  text: 度命飛仙符却死來生與神合德度世符夫俗人好道晚學初淺未識道源由且未離人間人間甚多罪咎犯之非一旣有反善之辭有攺誓聞於高上之聽愼不可復使犯惡逆違生之罪也重犯十過天地弗赦身死爲驗不可復攺𥙷者也太靈畢道甚有微妙至禁殺六畜衆生之物不能自攺心易行無所益也譬水火之交耳得其益者白日升天犯戒法則身殁三泉靈寳管中經曰尤重於八節趙伯玄所謂生死門户者也故九素玉傳經曰秋判之日尊卑盡會生死之日也古人以秋分之日爲秋判所以爾者秋分日乃會九天八地衆眞人神上皇至尊三日三宿共定萬民之命所聚者咸多而神尊並集也諸八節日會天地諸眞官先後及節凡三日三宿各還所司道士末學當依其日服仙生符升天符并除過符符文口付不欲筆傳祕之勿泄可不愼之右八節日服符正中北向吞之右太一除過符八節之日與仙符共服先服仙符次服此符也勑符三叩鍾祝曰天赫赫地青青太一符祕長生神童侍鍊身形肌膚強骨肉輕壽無極見太平謁眞君升天庭急急如律令素靈玄洞經曰上皇大帝君玉尊陛下乃上登清靈宅太虚之闕丹城紫臺長綿玉樓君集于太微之觀上開九天之門請九天之眞皇中要太上三老君北極諸眞及八海大神下命五嶽名山諸得仙者靈尊萬萬並會于寥陽之殿共集議天下萬民之罪福記諸吉凶學道勤懈䟽識犯過日月修行善惡刑罰之科生死之狀各隨其屬部境根源條例副之司命書于黄篇罪福纎芥刻于丹誠之籍伏匿之犯惡隂德之細功者無不一二縷别而知之者其夙夜半出中庭北向脫巾再拜長跪上啓太上北極天尊求赦萬過并服除過符也任意自陳乞服符畢便願曰太上皇帝削其死籍移書三官使著神仙之録某謁玉札長生乆視通眞逹靈畢又叩頭四下再拜而還靖室深自尅責并存念三元中神今上啓太上如此者三名上仙籍罪咎除滅也三元泥丸絳宫丹田三神也存念三元三神上啓天尊乞求恩赦助己自陳令必上聞者也秋分三啓生籍乃定死名乃除又洞逹命青中經曰夫好道精思常務在宿夜存念天地并愛育萬物當令行不敢傷神言不敢傷物天地者亦盡我身也師靖亦我身中是故聖人包内知外夫欲思攺更未必中庭并入靖也觀之所由察之所行此之謂也北辰亦我身形但當獨處所住屋室靜思按法燒香所念乃吉心中衆欲濁氣不除徒宿靖廬亦無所益昔有裴君止於空山之上修行精思一年之中髣髴形像二年之中五帝乗日形見在君左右三年之中終日而言笑樂五年之中五帝日君遂與裴君驂乗飛龍之車東到日窟之天東蒙長丘扶桑之宫八極之城登明眞之臺坐希林之殿授揮神之章九有之符食青精日飴飲雲碧玄腴於是與五帝日君日日而遊此所謂奔日之道也所以吸取日精五帝從日而前不可不修此一法要道隱書中篇曰子欲爲眞當存日君駕龍驂鳳乗天景雲東遊希林遂入帝門精思乃得要道不煩名上青靈列位眞官爲眞之法宿宿視月臨目閉氣九息因又咽月光九過當存月光使入口中即而吞之畢仍存青帝夫人從月光中來在我之左次存赤帝夫人在我之右次存白帝夫人在我之背次存黑帝夫人在我之左手上次存黄帝夫人在我右手上五帝夫人都來乃又存流鈴雲車駕十龍從月光中來到我之前存五夫人共載爲奔月也子欲升天存月大人駕乗飛龍乗我流鈴西到六嶺遂入帝堂精思乃見上朝天皇白日精思對日思日中五帝君夜則精思對月思存月中五夫人若能精誠日月並俱若始學則五靈形見授書賜芝威制羣神役使玉女玉童位此四眞故受太一素祕金劵正應向北面四拜拜四眞東西南北應位也受書眞人假神虎之符以制嚴六天流注邪精流金之鈴以命召衆眞杖青毛之節以周流九宫皆以精思微妙幽感天心是以靈降扶身上升帝庭耳道士行者若處宻室日月有隂不見時但心中存而思之不可待見日月也以彼精思心盡無所不通先存五星在體上有日月也右龍祕虎符道士入山佩之行來他方亦佩非太一道士不得妄佩也原缺右生靈九有符七月七日服之若佩之不食六畜食六畜不可服也此九眞道士裴處和在幽石山中九靈君三更授之欲得長生日服一符乆自升玄知道原缺右延年除百病符日吞一道原缺右逹視符修身一日服二道原缺右欲得長生日服一符乆乆自升玄知道見形逆知方來原缺上清太一金闕玉璽金眞紀
